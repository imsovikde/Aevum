name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Chrome Extension
        run: |
          mkdir build_chrome
          cp manifest.json newtab.html script.js styles.css build_chrome/
          cp favicon*.png icon.png build_chrome/ || true
          cp -r icons build_chrome/ || true
          
          # Clean Chrome Manifest (Remove Firefox-specific settings)
          jq 'del(.browser_specific_settings)' build_chrome/manifest.json > tmp.json && mv tmp.json build_chrome/manifest.json
          
          cd build_chrome && zip -r ../Aevum-Chrome-Extension.zip *

      - name: Package Firefox Extension
        run: |
          mkdir build_firefox
          cp manifest.json newtab.html script.js styles.css build_firefox/
          cp favicon*.png icon.png build_firefox/ || true
          cp -r icons build_firefox/ || true
          
          cd build_firefox && zip -r ../Aevum-Firefox-Extension.zip *

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Aevum-Chrome-Extension.zip
            Aevum-Firefox-Extension.zip
          generate_release_notes: true

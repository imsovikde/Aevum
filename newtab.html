<body>
    <div id="tv-transition-layer"></div>
    <div id="grain-overlay"></div>
    <div id="app">
        <div id="grid-container"></div>

        <div id="overlay-container" class="transparent">
            <div id="timer-container">
                <div id="timer-display">
                    <div class="time-unit">
                        <span id="years" class="number">00</span>
                        <span class="label">YRS</span>
                    </div>
                    <div class="time-unit">
                        <span id="months" class="number">00</span>
                        <span class="label">MTH</span>
                    </div>
                    <div class="time-unit">
                        <span id="days" class="number">00</span>
                        <span class="label">DYS</span>
                    </div>
                    <div class="time-unit">
                        <span id="hours" class="number">00</span>
                        <span class="label">HRS</span>
                    </div>
                    <div class="time-unit">
                        <span id="minutes" class="number">00</span>
                        <span class="label">MIN</span>
                    </div>
                    <div class="time-unit">
                        <span id="seconds" class="number">00</span>
                        <span class="label">SEC</span>
                    </div>
                    <div class="time-unit">
                        <span id="milliseconds" class="number">00</span>
                        <span class="label">MS</span>
                    </div>
                </div>
            </div>

            <div id="timer-title" style="display: none;"></div>
        </div>

        <button id="settings-toggle" aria-label="Settings">
            <div class="toggle-dot"></div>
        </button>

        <div id="settings-panel" class="hidden">
            <div class="settings-content">
                <div class="settings-header">
                    <h2>AEVUM</h2>
                    <button id="close-settings" aria-label="Close">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="settings-body">
                    <div class="form-row">
                        <label>Date of Birth (Origin)</label>
                        <div class="date-input-group">
                            <div class="date-part">
                                <input type="text" inputmode="numeric" maxlength="4" id="dob-year" placeholder="YYYY"
                                    class="sleek-input text-input num-input year-input">
                                <span class="sub-label">YYYY</span>
                            </div>
                            <span class="separator">-</span>
                            <div class="date-part">
                                <input type="text" inputmode="numeric" maxlength="2" id="dob-month" placeholder="MM"
                                    class="sleek-input text-input num-input">
                                <span class="sub-label">MM</span>
                            </div>
                            <span class="separator">-</span>
                            <div class="date-part">
                                <input type="text" inputmode="numeric" maxlength="2" id="dob-day" placeholder="DD"
                                    class="sleek-input text-input num-input">
                                <span class="sub-label">DD</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row inline-row">
                        <label>Life Expectancy (Years)</label>
                        <input type="number" id="life-expectancy-input" value="80" class="sleek-input text-right"
                            style="width: 80px;">
                    </div>

                    <div class="form-row">
                        <label>Granularity Threshold</label>
                        <input type="range" id="size-input" min="10" max="100" value="80" class="sleek-slider">
                    </div>

                    <div class="form-row inline-row">
                        <label>Scale Factor</label>
                        <input type="number" id="font-size-input" min="2" max="12" step="0.5" value="6"
                            class="sleek-input text-right" style="width: 80px;">
                    </div>

                    <div class="separator-line"></div>

                    <div class="form-row toggle-row">
                        <label>Atmospheric Overlay</label>
                        <button class="sleek-toggle" id="transparent-timer" role="switch" aria-checked="false">
                            <div class="toggle-track"></div>
                        </button>
                    </div>

                    <div class="form-row">
                        <label>Typography</label>
                        <div class="font-selector" id="typography-group">
                            <button data-value="inter" class="active font-btn">
                                <span class="font-name" style="font-family: 'Inter', sans-serif; font-weight: 500;">Clinical</span>
                                <span class="font-desc">Inter</span>
                            </button>
                            <button data-value="space-mono" class="font-btn">
                                <span class="font-name" style="font-family: 'Space Mono', monospace; font-weight: 400; letter-spacing: -1px;">Machine</span>
                                <span class="font-desc">Space Mono</span>
                            </button>
                            <button data-value="eb-garamond" class="font-btn">
                                <span class="font-name" style="font-family: 'EB Garamond', serif; font-weight: 400; font-style: italic;">Legacy</span>
                                <span class="font-desc">EB Garamond</span>
                            </button>
                            <button data-value="crimson-pro" class="font-btn">
                                <span class="font-name" style="font-family: 'Crimson Pro', serif; font-weight: 500;">Ethereal</span>
                                <span class="font-desc">Crimson Pro</span>
                            </button>
                        </div>
                    </div>

                    <div class="form-row toggle-row">
                        <label>Stark Weight</label>
                        <button class="sleek-toggle" id="bold-timer" role="switch" aria-checked="false">
                            <div class="toggle-track"></div>
                        </button>
                    </div>

                    <div class="form-row toggle-row">
                        <label>Inverse Chronology (Age)</label>
                        <button class="sleek-toggle" id="show-age" role="switch" aria-checked="false">
                            <div class="toggle-track"></div>
                        </button>
                    </div>

                    <div class="separator-line"></div>

                    <div class="form-row">
                        <label>Sub-Day Precision</label>
                        <div class="segmented-control precision-control" id="precision-group">
                            <button data-value="hours">HRS</button>
                            <button data-value="minutes">MIN</button>
                            <button data-value="seconds">SEC</button>
                            <button data-value="milliseconds" class="active">MS</button>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Structure Flow</label>
                        <div class="segmented-control" id="shape-group">
                            <button data-value="square" class="active">Rigid</button>
                            <button data-value="circle">Organic</button>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Temporal Node</label>
                        <div class="segmented-control" id="unit-precision-group">
                            <button data-value="weeks" class="active">Weeks</button>
                            <button data-value="months">Months</button>
                            <button data-value="years">Years</button>
                        </div>
                    </div>

                    <div class="separator-line"></div>

                    <div class="form-row">
                        <label>Atmosphere (Theme)</label>
                        <div class="theme-palette" id="theme-group">
                            <button class="theme-btn active" data-theme="dark" data-name="Dark"
                                style="background-color: #070707; border-color: #ffffff;"></button>
                            <button class="theme-btn" data-theme="ivory" data-name="Ivory"
                                style="background-color: #F4F3EE;"></button>
                            <button class="theme-btn" data-theme="midnight" data-name="Midnight" style="background-color: #050B14;"></button>
                            <button class="theme-btn" data-theme="cyber" data-name="Cyber" style="background-color: #0B0115;"></button>
                            <button class="theme-btn" data-theme="forest" data-name="Forest" style="background-color: #0c140f;"></button>
                            <button class="theme-btn" data-theme="sunset" data-name="Sunset" style="background-color: #140801;"></button>
                            <button class="theme-btn" data-theme="monochrome" data-name="Monochrome"
                                style="background-color: #FFFFFF;"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
